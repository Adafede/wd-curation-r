# Workflow derived from https://github.com/posit-dev/setup-air/tree/main/examples

on:
  push:
    branches: [main, master]
  pull_request:

name: format-check.yaml

permissions: read-all

jobs:
  format-check:
    runs-on: codeberg-tiny
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install air
        run: curl -fsSL https://github.com/posit-dev/air/releases/latest/download/air-installer.sh | sh

      - name: Check
        run: air format . --check